services:
  vertex-monitor:
    build: .
    image: vertex-monitor:latest
    container_name: vertex-monitor
    ports:
      - "8899:8899"
    volumes:
      # 持久化账本数据
      - ./data:/app/data
      # GCP 服务账号凭证（获取方式见 README）
      - ./vertex-key.json:/app/vertex-key.json:ro
    environment:
      - HOST=0.0.0.0
      - PORT=8899
      - GOOGLE_APPLICATION_CREDENTIALS=/app/vertex-key.json
    restart: unless-stopped
