services:
  vertex-monitor:
    build: .
    image: vertex-monitor:latest
    container_name: vertex-monitor
    ports:
      - "8899:8899"
    volumes:
      # 持久化数据（账本、设置、凭证）
      - ./data:/app/data
      # 静态文件（开发时挂载，修改即时生效）
      - ./static:/app/static
    environment:
      - HOST=0.0.0.0
      - PORT=8899
      - GOOGLE_APPLICATION_CREDENTIALS=/app/vertex-key.json
    restart: unless-stopped
